name: 10 Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "bicep/**"
  workflow_dispatch:
  schedule:
    # Sydney 6am and 2pm (AEST UTC+10). Cron is in UTC.
    - cron: "0 20 * * *"
    - cron: "0 4 * * *"

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

    #   - name: Create Resource Group
    #     run: az group create --name 'rg-ai-hack-2026' --location 'eastus2'

      - name: Deploy Bicep
        working-directory: bicep
        run: |
          az deployment group create \
            --name 'ai-hack-dev' \
            --resource-group 'rg-ai-hack-2026' \
            --template-file './main-sub1.bicep' \
            --parameters './main-sub1.parameters.dev.json'
