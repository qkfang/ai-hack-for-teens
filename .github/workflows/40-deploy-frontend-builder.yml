name: 40 Deploy Web Builder

on:
  push:
    branches: [main]
    paths:
      - "src/webbuilder/**"
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: src/webbuilder
        run: npm ci --legacy-peer-deps

      - name: Create .env file
        working-directory: src/webbuilder
        run: |
          cp .env.sample .env
          sed -i 's|^GH_TOKEN=.*|GH_TOKEN=${{ secrets.GH_TOKEN }}|' .env

      - name: Build
        working-directory: src/webbuilder
        run: npm run build

      - name: Prepare standalone package
        working-directory: src/webbuilder
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          # Copy @github/copilot into standalone (Next.js file tracing can't follow dynamic import.meta.resolve)
          mkdir -p .next/standalone/node_modules/@github
          cp -r node_modules/@github/copilot .next/standalone/node_modules/@github/copilot

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: aihack26-builder
          resource-group-name: rg-ai-hack-2026
          package: src/webbuilder/.next/standalone
