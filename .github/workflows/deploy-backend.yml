name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "src/api/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        working-directory: src/api
        run: dotnet restore

      - name: Build
        working-directory: src/api
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        working-directory: src/api
        run: dotnet publish --configuration Release --no-build --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: src/api/publish

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Restore dependencies
        working-directory: src/api
        run: dotnet restore
        
      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Run database migrations
        working-directory: src/api
        env:
          ConnectionStrings__DefaultConnection: "Server=tcp:aihack26-sql.database.windows.net,1433;Initial Catalog=ai-hack-db-dev;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;Authentication=Active Directory Default;"
          AZURE_TENANT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
          AZURE_CLIENT_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
          AZURE_CLIENT_SECRET: ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
        run: dotnet ef database update

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: dist

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: aihack26-app
          resource-group-name: rg-ai-hack-2026
          package: dist
