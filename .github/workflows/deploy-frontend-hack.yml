name: Deploy Hack Studio

on:
  push:
    branches: [main]
    paths:
      - "src/playground/**"
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install playground dependencies
        working-directory: src/playground
        run: npm ci --legacy-peer-deps

      - name: Create .env file
        working-directory: src/playground
        run: |
          cp .env.example .env
          sed -i 's|^VITE_API_BASE_URL=.*|VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}|' .env
          sed -i 's|^VITE_WEBBUILDER_URL=.*|VITE_WEBBUILDER_URL=${{ vars.VITE_WEBBUILDER_URL }}|' .env

      - name: Build playground
        working-directory: src/playground
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "src/playground/dist"
